<!DOCTYPE html>
<html>
<head>
  <title>Test</title>
  <style>
    body { font-family: Arial; background: #f0f0f0; padding: 20px; }
    .ok { color: green; font-weight: bold; }
    .error { color: red; font-weight: bold; }
    pre { background: white; padding: 10px; border-radius: 5px; overflow-x: auto; }
  </style>
</head>
<body>
<h1>Server & Application Test</h1>

<div id="status"></div>

<script>
const log = (msg, isError = false) => {
  const el = document.getElementById('status');
  const cls = isError ? 'error' : 'ok';
  el.innerHTML += `<p class="${cls}">${msg}</p>`;
};

log('Page loaded OK');

// Test 1: Check if we can fetch JSON
fetch('./data/meta.json')
  .then(r => {
    if (r.ok) {
      log('✓ data/meta.json loads');
      return r.json();
    } else {
      log(`✗ data/meta.json returned ${r.status}`, true);
    }
  })
  .then(d => {
    if (d) log(`✓ Meta data contains: ${Object.keys(d).join(', ')}`);
  })
  .catch(e => log(`✗ Error loading data: ${e}`, true));

// Test 2: Check if D3 is loaded
setTimeout(() => {
  if (typeof d3 !== 'undefined') {
    log(`✓ D3 ${d3.version} loaded`);
  } else {
    log('✗ D3 not loaded (script loading failed)', true);
  }
}, 1000);

// Test 3: Check app.js
window.addEventListener('error', (ev) => {
  log(`✗ JavaScript Error: ${ev.message} at ${ev.filename}:${ev.lineno}`, true);
});

log('Waiting for app.js to load...');
</script>
<script src="app.js"></script>
<script>
setTimeout(() => {
  if (typeof renderBalance !== 'undefined') {
    log('✓ app.js loaded and renderBalance exists');
  } else {
    log('✗ app.js loaded but renderBalance not found', true);
  }
}, 2000);
</script>
</body>
</html>
